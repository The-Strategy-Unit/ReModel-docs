meta:
  name:    
    full: The Strategy Unit
  link:
    home: https://www.strategyunitwm.nhs.uk/
    github: https://github.com/The-Strategy-Unit    

# adjust these paths if logos are placed elsewhere
logo:
  small: images/logo_black_favicon.png
  medium:
    light: images/logo_black_medium.png
    dark: images/logo_yellow_medium.png
  large: 
    light: images/logo_black.svg 
    dark: images/logo_yellow.svg  

color:
  palette:    
    dark-grey: "#959595"    
    su-charcoal: "#2c2825"
    su-yellow: "#f9bd07"    
    su-white: "#f5f4f3"
    su-blue: "#5881c1"    
  foreground: su-charcoal
  background: su-white
  primary: su-yellow
  secondary: dark-grey   
  info: su-blue

typography:
  fonts:
    - family: "Roboto Slab"
      weight: [300, 700]
      source: google
    - family: "Open Sans"
      weight: [400, 600, 700]
      source: google

  base:
    family: "Open Sans"
    weight: 400

  headings:
    family: "Roboto Slab"
    weight: 700

  link:
    color: info

